services:
  - type: web
    name: second-brain-api
    env: python
    rootDir: backend
    buildCommand: apt-get update && apt-get install -y tesseract-ocr poppler-utils && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: EMBEDDING_BACKEND
        value: hash
      - key: PDF_MAX_PAGES
        value: 30
      - key: PDF_MAX_CHARS
        value: 100000
      - key: PDF_OCR_MAX_PAGES
        value: 8
      - key: PDF_OCR_MAX_CHARS
        value: 50000
      - key: YOUTUBE_TRANSCRIPT_LANGUAGES
        value: en,hi,en-US,en-GB
      - key: YOUTUBE_PROXY_URL
        sync: false
      - key: WEBSHARE_PROXY_USERNAME
        sync: false
      - key: WEBSHARE_PROXY_PASSWORD
        sync: false
      - key: WEBSHARE_PROXY_LOCATIONS
        sync: false
      - key: WEBSHARE_RETRIES_WHEN_BLOCKED
        value: 10
      - key: SECOND_BRAIN_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
